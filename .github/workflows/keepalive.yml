name: Render Keep-Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health endpoint
        run: |
          echo "Pinging at $(date -u)"
          RESPONSE=$(curl --silent --max-time 30 --write-out "\nHTTP_STATUS:%{http_code} | TIME:%{time_total}s" \
            "https://talentlens-backend-dnwt.onrender.com/health")
          echo "$RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          echo "Status code: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Health check FAILED — got HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Backend is alive"
